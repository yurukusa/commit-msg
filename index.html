// ── Analysis engine ──
function parseDiff(text) {
  const files = [];
  const chunks = text.split(/^diff --git /m).filter(Boolean);

  for (const chunk of chunks) {
    const headerMatch = chunk.match(/^a\/(.+?) b\/(.+)/m);
    if (!headerMatch) continue;
    const pathA = headerMatch[1];
    const pathB = headerMatch[2];

    const isNew = /^new file mode/m.test(chunk);
    const isDeleted = /^deleted file mode/m.test(chunk);
    const isRenamed = pathA !== pathB && !isNew && !isDeleted;

    let additions = 0, deletions = 0;
    const lines = chunk.split('\n');
    for (const line of lines) {
      if (line.startsWith('+++') || line.startsWith('---')) continue;
      if (line.startsWith('+')) additions++;
      else if (line.startsWith('-')) deletions++;
    }

    files.push({
      path: pathB,
      pathOld: pathA,
      isNew, isDeleted, isRenamed,
      additions, deletions,
      ext: pathB.split('.').pop()?.toLowerCase() || '',
      dir: pathB.includes('/') ? pathB.split('/').slice(0, -1).join('/') : ''
    });
  }
  return files;
}

function detectType(files, desc) {
  // Score each type
  const scores = { feat: 0, fix: 0, refactor: 0, docs: 0, test: 0, chore: 0, style: 0, perf: 0 };

  const docExts = ['md', 'mdx', 'txt', 'rst', 'adoc'];
  const testPatterns = [/test/i, /spec/i, /__tests__/i, /\.test\./, /\.spec\./];
  const configFiles = [/package\.json$/, /tsconfig/, /eslint/, /prettier/, /\.yml$/, /\.yaml$/, /\.toml$/, /dockerfile/i, /\.env/, /\.gitignore/, /webpack/, /vite\.config/, /rollup/];
  const styleExts = ['css', 'scss', 'sass', 'less', 'styl'];

  let totalNew = 0, totalDeleted = 0;

  for (const f of files) {
    if (f.isNew) totalNew++;
    if (f.isDeleted) totalDeleted++;

    // Docs
    if (docExts.includes(f.ext) || f.dir.startsWith('docs')) {
      scores.docs += 3;
    }
    // Tests
    if (testPatterns.some(p => p.test(f.path))) {
      scores.test += 3;
    }
    // Config/chore
    if (configFiles.some(p => p.test(f.path))) {
      scores.chore += 3;
    }
    // Style
    if (styleExts.includes(f.ext)) {
      scores.style += 2;
    }
    // New non-test, non-config, non-doc files → feat
    if (f.isNew && !docExts.includes(f.ext) && !testPatterns.some(p => p.test(f.path)) && !configFiles.some(p => p.test(f.path))) {
      scores.feat += 4;
    }
    // Deleted files → chore unless part of refactor
    if (f.isDeleted) {
      scores.chore += 1;
    }
    // Modification of source files
    if (!f.isNew && !f.isDeleted && !docExts.includes(f.ext) && !testPatterns.some(p => p.test(f.path))) {
      // More deletions than additions → refactor
      if (f.deletions > f.additions * 1.3) {
        scores.refactor += 2;
      }
    }
  }

  // Description-based hints
  if (desc) {
    const d = desc.toLowerCase();
    if (/\b(fix|bug|issue|crash|error|broken|null|undefined|NaN)\b/.test(d)) scores.fix += 5;
    if (/\b(add|new|feature|implement|create|introduce)\b/.test(d)) scores.feat += 5;
    if (/\b(refactor|clean|simplify|extract|reorganize|restructure|migrate)\b/.test(d)) scores.refactor += 5;
    if (/\b(doc|readme|comment|jsdoc|api ref)\b/.test(d)) scores.docs += 5;
    if (/\b(test|spec|coverage)\b/.test(d)) scores.test += 5;
    if (/\b(chore|deps|dependency|config|ci|cd|build)\b/.test(d)) scores.chore += 5;
    if (/\b(style|css|theme|layout|design|ui)\b/.test(d)) scores.style += 5;
    if (/\b(perf|performance|optimize|speed|fast|cache)\b/.test(d)) scores.perf += 5;
  }

  // Pick the top
  let best = 'chore', bestScore = 0;
  for (const [type, score] of Object.entries(scores)) {
    if (score > bestScore) { bestScore = score; best = type; }
  }

  // Confidence
  const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
  const confidence = Math.min(Math.round((bestScore / total) * 100), 99);

  return { type: best, confidence, scores };
}

function detectScope(files) {
  if (files.length === 0) return '';
  if (files.length === 1) {
    const f = files[0];
    // Use the deepest meaningful directory
    const parts = f.dir.split('/').filter(Boolean);
    if (parts.length >= 2) return parts[parts.length - 1];
    if (parts.length === 1) return parts[0];
    // Use filename without extension for root files
    return f.path.split('/').pop().replace(/\.[^.]+$/, '');
  }

  // Find common directory
  const dirs = files.map(f => f.dir).filter(Boolean);
  if (dirs.length === 0) return '';

  // Most common top-level or second-level dir
  const counts = {};
  for (const d of dirs) {
    const parts = d.split('/').filter(Boolean);
    const key = parts.length >= 2 ? parts[1] || parts[0] : parts[0];
    if (key) counts[key] = (counts[key] || 0) + 1;
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  return sorted[0]?.[0] || '';
}

function detectBreaking(files, diffText) {
  const signals = [];

  // Renamed exports
  const removedExports = (diffText.match(/^-\s*export\s+/gm) || []).length;
  const addedExports = (diffText.match(/^\+\s*export\s+/gm) || []).length;
  if (removedExports > 0 && addedExports > 0) {
    signals.push('Renamed/changed exports');
  }

  // Changed interfaces/types
  const removedInterfaces = (diffText.match(/^-\s*(?:export\s+)?interface\s+(\w+)/gm) || []);
  const addedInterfaces = (diffText.match(/^\+\s*(?:export\s+)?interface\s+(\w+)/gm) || []);
  if (removedInterfaces.length > 0 && addedInterfaces.length > 0) {
    const oldNames = removedInterfaces.map(l => l.match(/interface\s+(\w+)/)?.[1]);
    const newNames = addedInterfaces.map(l => l.match(/interface\s+(\w+)/)?.[1]);
    const renamed = oldNames.filter(n => n && !newNames.includes(n));
    if (renamed.length > 0) signals.push(`Renamed interface: ${renamed.join(', ')}`);
  }

  // Large deletions in source files
  const srcFiles = files.filter(f => !['md','txt','json','yml','yaml'].includes(f.ext));
  const totalDel = srcFiles.reduce((s, f) => s + f.deletions, 0);
  const totalAdd = srcFiles.reduce((s, f) => s + f.additions, 0);
  if (totalDel > 15 && totalDel > totalAdd * 0.8) {
    signals.push('Significant code removal');
  }

  // Deleted files
  const deletedSrc = files.filter(f => f.isDeleted && !['md','txt'].includes(f.ext));
  if (deletedSrc.length > 0) {
    signals.push(`Deleted: ${deletedSrc.map(f => f.path).join(', ')}`);
  }

  // Changed function signatures
  const removedFns = (diffText.match(/^-\s*(?:export\s+)?(?:async\s+)?function\s+(\w+)/gm) || []);
  const addedFns = (diffText.match(/^\+\s*(?:export\s+)?(?:async\s+)?function\s+(\w+)/gm) || []);
  if (removedFns.length > 0 && addedFns.length > 0) {
    const oldFn = removedFns.map(l => l.match(/function\s+(\w+)/)?.[1]);
    const newFn = addedFns.map(l => l.match(/function\s+(\w+)/)?.[1]);
    const renamed = oldFn.filter(n => n && !newFn.includes(n));
    if (renamed.length > 0) signals.push(`Renamed function: ${renamed.join(', ')}`);
  }

  return signals;
}

function generateDescription(files, type, desc) {
  if (desc && desc.trim()) return desc.trim().charAt(0).toLowerCase() + desc.trim().slice(1).replace(/\.$/, '');

  const newFiles = files.filter(f => f.isNew);
  const modFiles = files.filter(f => !f.isNew && !f.isDeleted);
  const delFiles = files.filter(f => f.isDeleted);

  if (type === 'feat' && newFiles.length > 0) {
    const name = newFiles[0].path.split('/').pop().replace(/\.[^.]+$/, '');
    return `add ${name}` + (newFiles.length > 1 ? ` and ${newFiles.length - 1} more file${newFiles.length > 2 ? 's' : ''}` : '');
  }
  if (type === 'fix' && modFiles.length > 0) {
    const name = modFiles[0].path.split('/').pop().replace(/\.[^.]+$/, '');
    return `fix ${name}` + (modFiles.length > 1 ? ` and related files` : '');
  }
  if (type === 'docs') {
    if (newFiles.length > 0) return `add documentation`;
    return `update documentation`;
  }
  if (type === 'refactor') {
    const name = (modFiles[0] || files[0])?.path.split('/').pop().replace(/\.[^.]+$/, '');
    return `refactor ${name || 'code'}`;
  }
  if (type === 'test') return `update tests`;
  if (type === 'chore') {
    if (delFiles.length > 0) return `remove unused files`;
    return `update configuration`;
  }
  return `update ${files.length} file${files.length > 1 ? 's' : ''}`;
}

function generateBody(files) {
  const lines = [];
  const newFiles = files.filter(f => f.isNew);
  const modFiles = files.filter(f => !f.isNew && !f.isDeleted);
  const delFiles = files.filter(f => f.isDeleted);

  if (newFiles.length) lines.push(`- Add ${newFiles.map(f => f.path.split('/').pop()).join(', ')}`);
  if (modFiles.length) lines.push(`- Update ${modFiles.map(f => f.path.split('/').pop()).join(', ')}`);
  if (delFiles.length) lines.push(`- Remove ${delFiles.map(f => f.path.split('/').pop()).join(', ')}`);

  const totalAdd = files.reduce((s, f) => s + f.additions, 0);
  const totalDel = files.reduce((s, f) => s + f.deletions, 0);
  lines.push(`- ${totalAdd} insertion${totalAdd !== 1 ? 's' : ''}(+), ${totalDel} deletion${totalDel !== 1 ? 's' : ''}(-)`);

  return lines.join('\n');
}

function analyze() {
  const diff = document.getElementById('diffInput').value.trim();
  const desc = document.getElementById('descInput').value.trim();

  if (!diff) {
    document.getElementById('analysisArea').innerHTML = '<div class="empty-state">Please paste a git diff to analyze</div>';
    document.getElementById('outputArea').style.display = 'none';
    return;
  }

  const files = parseDiff(diff);
  if (files.length === 0) {
    document.getElementById('analysisArea').innerHTML = '<div class="empty-state">Could not parse any files from the diff. Make sure it\'s a valid git diff output.</div>';
    document.getElementById('outputArea').style.display = 'none';
    return;
  }

  const { type, confidence } = detectType(files, desc);
  const scope = detectScope(files);
  const breaking = detectBreaking(files, diff);
  const description = generateDescription(files, type, desc);
  const body = generateBody(files);

  const totalAdd = files.reduce((s, f) => s + f.additions, 0);
  const totalDel = files.reduce((s, f) => s + f.deletions, 0);

  // Build analysis panel
  const tagClass = `tag tag-${type}`;
  let breakingTag = breaking.length > 0 ? ' <span class="tag tag-breaking">BREAKING</span>' : '';
  const confColor = confidence > 70 ? 'var(--green)' : confidence > 40 ? 'var(--orange)' : 'var(--red)';

  let fileListHtml = '';
  for (const f of files) {
    const icon = f.isNew ? '<span class="add">+</span>' : f.isDeleted ? '<span class="del">-</span>' : '<span class="mod">~</span>';
    fileListHtml += `<div>${icon} ${f.path}</div>`;
  }

  document.getElementById('analysisArea').innerHTML = `
    <div class="analysis">
      <div class="stat accent"><div class="val">${files.length}</div><div class="lbl">Files changed</div></div>
      <div class="stat green"><div class="val">+${totalAdd}</div><div class="lbl">Additions</div></div>
      <div class="stat red"><div class="val">-${totalDel}</div><div class="lbl">Deletions</div></div>
      <div class="stat orange"><div class="val"><span class="${tagClass}">${type}</span>${breakingTag}</div><div class="lbl">Detected type</div></div>
    </div>
    <div style="font-size:.82rem;color:var(--text-muted)">Confidence
      <div class="confidence-bar"><div class="confidence-fill" style="width:${confidence}%;background:${confColor}"></div></div>
      <span style="font-size:.75rem">${confidence}%</span>
    </div>
    <div class="file-list">${fileListHtml}</div>
  `;

  // Build commit message
  const scopePart = scope ? `(${scope})` : '';
  const subject = `${type}${scopePart}: ${description}`;
  let fullMsg = subject;
  if (body) fullMsg += '\n\n' + body;
  if (breaking.length > 0) {
    fullMsg += '\n\nBREAKING CHANGE: ' + breaking.join('. ') + '.';
  }

  let outputHtml = `
    <div class="output-block">
      <div class="label">Subject line</div>
      <button class="copy-btn" onclick="copyText(this, '${escapeAttr(subject)}')">Copy</button>
      <span style="color:var(--accent);font-weight:600">${escapeHtml(subject)}</span>
    </div>
  `;

  if (body) {
    outputHtml += `
      <div class="output-block">
        <div class="label">Body</div>
        <button class="copy-btn" onclick="copyText(this, '${escapeAttr(body)}')">Copy</button>
${escapeHtml(body)}
      </div>
    `;
  }

  if (breaking.length > 0) {
    const breakingText = 'BREAKING CHANGE: ' + breaking.join('. ') + '.';
    outputHtml += `
      <div class="output-block" style="border-color:rgba(248,81,73,.4)">
        <div class="label" style="color:var(--red)">Breaking Change Footer</div>
        <button class="copy-btn" onclick="copyText(this, '${escapeAttr(breakingText)}')">Copy</button>
        <span style="color:var(--red)">${escapeHtml(breakingText)}</span>
      </div>
    `;
  }

  outputHtml += `
    <button class="btn btn-primary full-msg-btn" onclick="copyText(this, '${escapeAttr(fullMsg)}')">Copy Full Message</button>
  `;

  document.getElementById('outputSection').innerHTML = outputHtml;
  document.getElementById('outputArea').style.display = 'block';
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeAttr(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n'); }

function copyText(btn, text) {
  // Unescape the text
  const decoded = text.replace(/\\n/g, '\n').replace(/\\'/g, "'").replace(/\\\\/g, '\\');
  navigator.clipboard.writeText(decoded).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function loadExample(key) {
  document.getElementById('diffInput').value = EXAMPLES[key] || '';
  document.getElementById('descInput').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.example === key));
  analyze();
}

function clearAll() {
  document.getElementById('diffInput').value = '';
  document.getElementById('descInput').value = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.getElementById('analysisArea').innerHTML = '<div class="empty-state">Paste a diff and click Generate to see analysis</div>';
  document.getElementById('outputArea').style.display = 'none';
}
</script>
</body>
</html>
